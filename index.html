<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>シンプルTODOアプリ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-title">TODOアプリ</h1>
        <p class="app-description">やることを入力して管理しましょう</p>
      </header>

      <main class="app-main">
        <form class="task-form">
          <input
            type="text"
            class="task-input"
            placeholder="新しいタスクを入力"
          />
          <button type="submit" class="task-add-button">追加</button>
        </form>

        <section class="task-list-area">
          <h2 class="task-list-title">タスク一覧</h2>
          <ul class="task-list">
            <li class="task-item">
              <label class="task-label">
                <input type="checkbox" class="task-checkbox" />
                <span class="task-text">買い物に行く</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>

            <li class="task-item">
              <label class="task-label">
                <input type="checkbox" class="task-checkbox" />
                <span class="task-text">メールを返信する</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>

            <li class="task-item is-completed">
              <label class="task-label">
                <input type="checkbox" class="task-checkbox" checked />
                <span class="task-text">部屋を掃除する</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>
          </ul>
        </section>
      </main>
    </div>
  </body>
</html>
